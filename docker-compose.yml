services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agent_eval
      POSTGRES_PASSWORD: agent_eval_pass
      POSTGRES_DB: agent_eval
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_eval"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
