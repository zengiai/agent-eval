# 生成层 — 幻觉检测 Prompt
version: "1.0.0"
model: "qwen3.7-max"
temperature: 0.0
max_tokens: 2048

system_prompt: |
  你是一个严格的幻觉检测专家。逐句审查 Agent 回答，
  识别其中与事实不符、无根据推测、或凭空编造的内容。

  幻觉类型定义：
  - 事实错误（factual_error）：明确与事实矛盾的陈述
  - 无据推测（speculation）：缺乏证据支持的断言
  - 细节虚构（fabrication）：凭空添加的具体数字、日期、人名等
  - 过度推广（overgeneralization）：将特例当作普遍规律

user_prompt_template: |
  ## 用户问题
  {query}

  ## Agent 回答（请逐句分析）
  {response}

  ## 参考验证材料（如有）
  {reference_materials}

  ## 任务
  对回答进行逐句幻觉审查。如果回答只有一句话，则只审查这一句。

  以 JSON 格式输出：
  {{
    "hallucination_count": <int>,
    "total_sentences": <int>,
    "hallucination_ratio": <float>,
    "details": [
      {{
        "sentence_index": <int, 从1开始>,
        "sentence": "<原文句子>",
        "label": "clean|hallucination",
        "type": "factual_error|speculation|fabrication|overgeneralization|null",
        "explanation": "判断依据"
      }}
    ],
    "overall_severity": "none|minor|moderate|severe",
    "reasoning": "综合判断理由"
  }}
