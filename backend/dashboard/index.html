    }).join('') : '<p>暂无评分历史，请先执行评分</p>';

    openSlidePanel(`Case 评分历史: ${escapeHtml(data.query.substring(0, 40))}`, `
      <p style="color:var(--text-secondary);font-size:13px;">最近均分: <b>${data.last_avg_score != null ? data.last_avg_score.toFixed(1) : '-'}</b> | 执行次数: <b>${data.run_count}</b></p>
      <hr>
      ${historyHtml}
    `);
  } catch(e) { showToast('加载评分历史失败', 'error'); }
}

// ═══ CaseSets ═══
let _activeCaseSetBatchTaskId = null;
let _caseSetBatchPollTimer = null;
let _caseSetCache = [];

async function loadCaseSets() {
  const params = new URLSearchParams();
  const search = $('#case-set-search').value;
  if (search) params.set('search', search);
  const category = $('#case-set-category').value;
  if (category) params.set('category', category);

  try {
    const res = await fetch(`${API_BASE}/case-sets?${params}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '加载失败');
    renderCaseSets(data);
  } catch(e) {
    showToast('加载 CaseSet 列表失败: ' + e.message, 'error');
  }
}

function renderCaseSets(data) {
  const items = data.case_sets || [];
  _caseSetCache = items;
  const tbody = $('#case-set-tbody');
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无测试集</td></tr>';
  } else {
    tbody.innerHTML = items.map(cs => `
      <tr>
        <td class="query" title="${escapeHtml(cs.name)}">${escapeHtml(cs.name)}</td>
        <td>${escapeHtml(cs.category || '-')}</td>
        <td>${escapeHtml(cs.version || '-')}</td>
        <td><b>${cs.case_count || 0}</b></td>
        <td style="font-size:12px;color:var(--text-secondary);">${formatDateSafe(cs.created_at)}</td>
        <td style="display:flex;gap:6px;">
          <button class="btn btn-outline btn-sm" onclick="viewCaseSetDetail('${cs.full_id || cs.id}')">详情</button>
          <button class="btn btn-outline btn-sm" onclick="selectCaseSetForBatch('${cs.full_id || cs.id}')">选择</button>
        </td>
      </tr>
    `).join('');
  }

  const select = $('#batch-case-set-id');
  const previous = select.value;
  select.innerHTML = '<option value="">新建测试集</option>' + items.map(cs =>
    `<option value="${cs.full_id || cs.id}">${escapeHtml(cs.name)} (${cs.case_count || 0})</option>`
  ).join('');
  if (previous && items.some(cs => (cs.full_id || cs.id) === previous)) select.value = previous;
}

function selectCaseSetForBatch(caseSetId) {
  $('#batch-case-set-id').value = caseSetId;
  const found = _caseSetCache.find(cs => (cs.full_id || cs.id) === caseSetId);
  $('#batch-case-set-name').value = found?.name || '';
}

async function submitCaseSetBatch() {
  const btn = $('#btn-submit-case-set-batch');
  const caseSetId = $('#batch-case-set-id').value;
  const name = $('#batch-case-set-name').value.trim();
  const questionsText = $('#batch-questions').value.trim();
  if (!caseSetId && !name) {
    showToast('请填写 CaseSet 名称或选择已有测试集', 'error');
    return;
  }
  if (!questionsText) {
    showToast('请至少输入一条 question', 'error');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 提交中';
  try {
    const payload = {
      case_set_id: caseSetId || null,
      name: name || null,
      description: $('#batch-description').value.trim() || null,
      category: $('#batch-category').value.trim() || null,
      agent_version: $('#batch-agent-version').value.trim() || null,
      concurrency: Number($('#batch-concurrency').value || 3),
      questions_text: questionsText,
    };
    const res = await fetch(`${API_BASE}/case-sets/batch-from-questions`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '提交失败');

    _activeCaseSetBatchTaskId = data.task_id;
    renderCaseSetBatchTask({
      task_id: data.task_id,
      status: data.status,
      total_cases: data.total_questions,
      completed_cases: 0,
      failed_cases: 0,
      processed_cases: 0,
      progress: 0,
      summary_metrics: {},
    });
    showToast('批量任务已提交', 'success');
    startCaseSetBatchPolling(data.task_id);
    loadCaseSets();
  } catch(e) {
    showToast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '开始生成';
  }
}

function startCaseSetBatchPolling(taskId) {
  if (_caseSetBatchPollTimer) clearInterval(_caseSetBatchPollTimer);
  _caseSetBatchPollTimer = setInterval(() => pollCaseSetBatchTask(taskId), 3000);
  pollCaseSetBatchTask(taskId);
}

function stopCaseSetBatchPolling() {
  if (_caseSetBatchPollTimer) {
    clearInterval(_caseSetBatchPollTimer);
    _caseSetBatchPollTimer = null;
  }
}

async function pollCaseSetBatchTask(taskId) {
  try {
    const res = await fetch(`${API_BASE}/case-sets/batch-tasks/${taskId}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '任务查询失败');
    renderCaseSetBatchTask(data);
    if (data.status === 'completed' || data.status === 'failed') {
      stopCaseSetBatchPolling();
      loadCaseSets();
    }
  } catch(e) {
    stopCaseSetBatchPolling();
    showToast('批量任务轮询失败: ' + e.message, 'error');
  }
}

function batchStatusBadgeHtml(status) {
  if (status === 'running') return '<span class="badge badge-running"><span class="spinner" style="width:10px;height:10px;border-width:1.5px;vertical-align:middle;margin-right:3px;"></span>运行中</span>';
  if (status === 'completed') return '<span class="badge badge-completed">✓ 完成</span>';
  if (status === 'failed') return '<span class="badge badge-failed">✗ 失败</span>';
  return `<span class="badge">${escapeHtml(status || '-')}</span>`;
}

function renderCaseSetBatchTask(task) {
  const panel = $('#case-set-task-panel');
  panel.classList.remove('hidden');
  const metrics = task.summary_metrics || {};
  const itemResults = metrics.item_results || [];
  const progress = Math.max(0, Math.min(100, Number(task.progress || 0)));
  const rows = itemResults.slice(-8).map(item => {
    const ok = item.status === 'completed';
    const label = ok ? `Case ${escapeHtml(item.case_id || '-')}` : escapeHtml(item.error || '失败');
    return `<div class="task-result-row">
      <div class="idx">#${item.index || '-'}</div>
      <div class="msg"><span class="badge ${ok ? 'badge-success' : 'badge-error'}">${ok ? '完成' : '失败'}</span> ${escapeHtml(item.question || '')}<br><span style="color:var(--text-secondary);">${label}</span></div>
    </div>`;
  }).join('');

  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
      <strong>批量任务</strong>
      ${batchStatusBadgeHtml(task.status)}
    </div>
    <div class="task-progress"><div class="task-progress-fill" style="width:${progress}%;"></div></div>
    <div class="task-meta">
      <span>任务: <code>${escapeHtml((task.task_id || '').slice(0, 8))}</code></span>
      <span>进度: <b>${task.processed_cases || 0}/${task.total_cases || 0}</b></span>
      <span>成功: <b style="color:var(--success);">${task.completed_cases || 0}</b></span>
      <span>失败: <b style="color:var(--danger);">${task.failed_cases || 0}</b></span>
    </div>
    ${rows ? `<div class="task-results">${rows}</div>` : ''}
  `;
}

async function viewCaseSetDetail(caseSetId) {
  try {
    const res = await fetch(`${API_BASE}/case-sets/${caseSetId}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '加载失败');
    const cs = data.case_set;
    const latest = data.latest_batch_task ? renderCaseSetTaskSummary(data.latest_batch_task) : '<p style="color:var(--text-secondary);">暂无批量任务</p>';
    const cases = data.cases || [];
    const casesHtml = cases.length ? `
      <table>
        <thead><tr><th>Query</th><th>分数</th><th>次数</th><th>操作</th></tr></thead>
        <tbody>
          ${cases.map(c => `
            <tr>
              <td class="query" title="${escapeHtml(c.query)}">${escapeHtml(c.query)}</td>
              <td>${c.last_avg_score != null ? c.last_avg_score.toFixed(1) : '-'}</td>
              <td>${c.run_count || 0}</td>
              <td>${c.source_trace_id ? `<button class="btn btn-outline btn-sm" onclick="viewTraceDetail('${c.source_trace_id}', '${c.id}')">Trace</button>` : `<button class="btn btn-outline btn-sm" onclick="viewCaseDetail('${c.id}')">Case</button>`}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    ` : '<div class="empty-state">暂无 Case</div>';

    openSlidePanel(`CaseSet: ${escapeHtml(cs.name)}`, `
      <p><strong>ID:</strong> <code>${escapeHtml(cs.full_id)}</code></p>
      <p><strong>分类:</strong> ${escapeHtml(cs.category || '-')} | <strong>版本:</strong> ${escapeHtml(cs.version || '-')} | <strong>Case:</strong> ${cs.case_count || 0}</p>
      <p><strong>描述:</strong> ${escapeHtml(cs.description || '-')}</p>
      <hr>
      ${latest}
      <hr>
      ${casesHtml}
    `);
  } catch(e) {
    showToast('加载 CaseSet 详情失败: ' + e.message, 'error');
  }
}

function renderCaseSetTaskSummary(task) {
  const progress = Math.max(0, Math.min(100, Number(task.progress || 0)));
  return `
    <div class="task-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
        <strong>最近批量任务</strong>
        ${batchStatusBadgeHtml(task.status)}
      </div>
      <div class="task-progress"><div class="task-progress-fill" style="width:${progress}%;"></div></div>
      <div class="task-meta">
        <span>进度: <b>${task.processed_cases || 0}/${task.total_cases || 0}</b></span>
        <span>成功: <b style="color:var(--success);">${task.completed_cases || 0}</b></span>
        <span>失败: <b style="color:var(--danger);">${task.failed_cases || 0}</b></span>
      </div>
    </div>
  `;
}

async function loadCaseStats() {
  try {
    const res = await fetch(`${API_BASE}/cases?limit=1`);
    const data = await res.json();
    $('#stat-cases').textContent = data.total;
    $('#bento-cases').textContent = data.total;
  } catch(e) {}
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// ═══ Final Response Raw / Markdown 切换 ═══
function switchFRMode(btn, mode) {
  const section = btn.closest('.fr-section');
  if (!section) return;
  const rawEl = section.querySelector('.fr-raw');
  const previewEl = section.querySelector('.fr-preview');
  const toggles = section.querySelectorAll('.fr-toggle');

  toggles.forEach(t => t.classList.remove('active'));
  btn.classList.add('active');

  if (mode === 'raw') {
    rawEl.classList.remove('hidden');
    previewEl.classList.remove('visible');
  } else {
    rawEl.classList.add('hidden');
    previewEl.classList.add('visible');
    // 按需渲染 md → html（缓存）
    if (!previewEl.dataset.rendered) {
      const rawText = rawEl.textContent || '';
      if (typeof marked !== 'undefined') {
        marked.setOptions?.({ breaks: true, gfm: true });
        previewEl.innerHTML = marked.parse(rawText);
      } else {
        previewEl.innerHTML = '<p style="color:var(--danger);">marked.js 未加载，请检查网络</p>';
      }
      previewEl.dataset.rendered = '1';
    }
  }
}

// ═══ Span Popover 定位（全局 popover，脱离 slide-panel transform containing block） ═══
const _popGlobal = $('#span-popover-global');
const _popoverStore = new Map(); // span.id → popover HTML，避免 data 属性编码截断
let _activeNode = null;

document.addEventListener('mouseover', function(e) {
  // 鼠标在 popover 内部 → 保持显示
  if (e.target.closest('#span-popover-global')) return;

  const node = e.target.closest('.span-node');
  if (!node) {
    hidePopover();
    return;
  }

  // 同一个 node 不做重复处理
  if (node === _activeNode) return;

  // 从全局 Map 读取 popover 内容（by span.id，避免属性编码截断）
  const spanId = node.dataset.spanId;
  const popoverHtml = spanId ? _popoverStore.get(spanId) : null;
  if (!popoverHtml) { hidePopover(); return; }

  // 填充全局 popover
  _popGlobal.innerHTML = popoverHtml;
  const popW = Math.min(340, Math.max(260, window.innerWidth - 16));
  const maxPopH = Math.min(420, window.innerHeight - 16);
  _popGlobal.style.maxHeight = maxPopH + 'px';
  _popGlobal.style.width = popW + 'px';
  _popGlobal.style.visibility = 'hidden';
  _popGlobal.style.display = 'block';

  // 定位
  const box = node.querySelector('.span-node-box');
  if (!box) { hidePopover(); return; }
  const boxRect = box.getBoundingClientRect();
  const popH = Math.min(maxPopH, _popGlobal.scrollHeight || maxPopH);
  let left = boxRect.right + 12;
  let top = boxRect.top;

  // 边界修正：优先显示在节点右侧，右侧不足时再回退到左侧或视口内。
  if (left + popW > window.innerWidth - 8) {
    const fallbackLeft = boxRect.left - popW - 12;
    left = fallbackLeft >= 8 ? fallbackLeft : window.innerWidth - popW - 8;
  }
  if (top + popH > window.innerHeight - 8) top = window.innerHeight - popH - 8;
  if (top < 8) top = 8;
  if (left < 8) left = 8;
  if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;

  _popGlobal.style.left = left + 'px';
  _popGlobal.style.top = top + 'px';
  _popGlobal.style.visibility = 'visible';
  _activeNode = node;
}, true);

document.addEventListener('mouseout', function(e) {
  // 移到 popover 上 → 保持
  if (e.relatedTarget?.closest?.('#span-popover-global')) return;
  // 移到另一个 span-node 上 → mouseover 会处理
  if (e.relatedTarget?.closest?.('.span-node')) return;
  // 彻底离开 → 隐藏
  hidePopover();
}, true);

function hidePopover() {
  _popGlobal.style.display = 'none';
  _popGlobal.innerHTML = '';
  _activeNode = null;
}

// ── ⌘K 命令面板 ──
(function() {
  const overlay = $('#cmd-overlay');
  const input = $('#cmd-input');
  const list = $('#cmd-list');
  const items = () => [...list.querySelectorAll('.cmd-item')];
  let selIdx = -1;

  function open() {
    overlay.classList.add('show');
    input.value = '';
    selIdx = -1;
    filterItems('');
    setTimeout(() => input.focus(), 50);
  }
  function close() {
    overlay.classList.remove('show');
    selIdx = -1;
  }
  function filterItems(q) {
    const all = items();
    const ql = q.toLowerCase();
    let first = null;
    all.forEach((el, i) => {
      const txt = el.textContent.toLowerCase();
      const show = !ql || txt.includes(ql);
      el.style.display = show ? '' : 'none';
      el.classList.remove('selected');
      if (show && !first) first = i;
    });
    // 同步隐藏空分组标签
    list.querySelectorAll('.cmd-group-label').forEach(lbl => {
      let hasVisible = false;
      let next = lbl.nextElementSibling;
      while (next && !next.classList.contains('cmd-group-label')) {
        if (next.style.display !== 'none') { hasVisible = true; break; }
        next = next.nextElementSibling;
      }
      lbl.style.display = hasVisible ? '' : 'none';
    });
    selIdx = first != null ? first : -1;
    if (selIdx >= 0) {
      const visible = items().filter(el => el.style.display !== 'none');
      if (visible[0]) visible[0].classList.add('selected');
    }
  }
  function selectCurrent() {
    const visible = items().filter(el => el.style.display !== 'none');
    if (selIdx >= 0 && selIdx < visible.length) {
      executeAction(visible[selIdx].dataset.action);
    }
  }
  function executeAction(action) {
    close();
    switch (action) {
      case 'tab-traces':
        document.querySelector('.nav-pill[data-tab="traces"]')?.click();
        break;
      case 'tab-cases':
        document.querySelector('.nav-pill[data-tab="cases"]')?.click();
        break;
      case 'tab-case-sets':
        document.querySelector('.nav-pill[data-tab="case-sets"]')?.click();
        break;
      case 'brain':
        window.location.href = '/dashboard/brain.html';
        break;
      case 'search-traces':
        document.querySelector('.nav-pill[data-tab="traces"]')?.click();
        setTimeout(() => $('#trace-search')?.focus(), 200);
        break;
      case 'search-cases':
        document.querySelector('.nav-pill[data-tab="cases"]')?.click();
        setTimeout(() => $('#case-search')?.focus(), 200);
        break;
    }
  }

  // 键盘快捷键
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      overlay.classList.contains('show') ? close() : open();
      return;
    }
    if (!overlay.classList.contains('show')) return;
    if (e.key === 'Escape') { e.preventDefault(); close(); return; }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      const visible = items().filter(el => el.style.display !== 'none');
      visible.forEach(el => el.classList.remove('selected'));
      selIdx = Math.min(selIdx + 1, visible.length - 1);
      if (visible[selIdx]) visible[selIdx].classList.add('selected');
      return;
    }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      const visible = items().filter(el => el.style.display !== 'none');
      visible.forEach(el => el.classList.remove('selected'));
      selIdx = Math.max(selIdx - 1, 0);
      if (visible[selIdx]) visible[selIdx].classList.add('selected');
      return;
    }
    if (e.key === 'Enter') { e.preventDefault(); selectCurrent(); return; }
  });

  input.addEventListener('input', () => filterItems(input.value));
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  list.addEventListener('click', e => {
    const item = e.target.closest('.cmd-item');
    if (item) executeAction(item.dataset.action);
  });
  $('#cmd-trigger').addEventListener('click', open);

  // 数字快捷键
  document.addEventListener('keydown', e => {
    if (overlay.classList.contains('show')) return;
    if (!e.metaKey && !e.ctrlKey && !e.target.closest('input, textarea, select')) {
      if (e.key === '1') document.querySelector('.nav-pill[data-tab="traces"]')?.click();
      else if (e.key === '2') document.querySelector('.nav-pill[data-tab="cases"]')?.click();
      else if (e.key === '3') document.querySelector('.nav-pill[data-tab="case-sets"]')?.click();
    }
  });
})();

loadTraces();
loadCaseStats();
