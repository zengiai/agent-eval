<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Eval Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #f5f6f8;
    --card-bg: #ffffff;
    --card-hover: #f8f9fc;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --border-strong: #d1d5db;
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --primary-soft: rgba(99,102,241,0.08);
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

  /* ═══ 滚动条 ═══ */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

  /* ═══ 问候栏 ═══ */
  .greeting-bar { padding: 24px 28px 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .greeting-text h1 { font-size: 22px; font-weight: 700; letter-spacing: -.3px; margin: 0 0 4px; }
  .greeting-summary { font-size: 13px; color: var(--text-secondary); margin: 0; line-height: 1.5; }
  .greeting-summary strong { color: var(--text); font-weight: 600; }
  .greeting-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .version-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; background: var(--primary-soft); color: var(--primary); border: 1px solid rgba(129,140,248,0.15); }

  /* ═══ ⌘K 徽章 ═══ */
  .cmd-badge { display: inline-flex; align-items: center; justify-content: center; height: 32px; padding: 0 12px; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: var(--font-mono); color: var(--text-secondary); background: var(--card-bg); border: 1px solid var(--border); cursor: pointer; transition: all .15s; user-select: none; }
  .cmd-badge:hover { border-color: var(--border-strong); color: var(--text); background: var(--card-hover); }

  /* ═══ Bento 统计卡片 ═══ */
  .bento-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 0 28px 20px; }
  .bento-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; display: flex; align-items: center; gap: 14px; transition: all .2s; cursor: default; }
  .bento-card:hover { border-color: var(--border-strong); background: var(--card-hover); transform: translateY(-1px); }
  .bento-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
  .bento-icon::after { content: ''; width: 8px; height: 8px; border-radius: 50%; }
  .bento-icon.blue { background: #eef2ff; }
  .bento-icon.blue::after { background: #6366f1; }
  .bento-icon.green { background: #ecfdf5; }
  .bento-icon.green::after { background: #059669; }
  .bento-icon.amber { background: #fffbeb; }
  .bento-icon.amber::after { background: #d97706; }
  .bento-icon.purple { background: #f5f3ff; }
  .bento-icon.purple::after { background: #7c3aed; }
  .bento-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .bento-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-secondary); }
  .bento-number { font-size: 22px; font-weight: 700; letter-spacing: -.5px; color: var(--text); line-height: 1.1; }
  .bento-sub { font-size: 11px; color: var(--text-secondary); }

  /* ═══ 容器 ═══ */
  .container { max-width: 1400px; margin: 0 auto; padding: 0 28px 24px; }

  /* ═══ 导航 Pills ═══ */
  .nav-pills { display: flex; gap: 6px; margin-bottom: 20px; padding: 4px; border-radius: 10px; background: var(--card-bg); border: 1px solid var(--border); width: fit-content; }
  .nav-pill { padding: 8px 18px; border: none; background: none; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-radius: 7px; transition: all .15s; white-space: nowrap; }
  .nav-pill:hover { color: var(--text); }
  .nav-pill.active { background: var(--primary-soft); color: var(--primary); }
  .nav-link { padding: 8px 18px; font-size: 13px; font-weight: 600; color: var(--text-secondary); text-decoration: none; border-radius: 7px; transition: all .15s; white-space: nowrap; }
  .nav-link:hover { color: var(--text); background: var(--card-hover); }

  /* ═══ 工具栏 ═══ */
  .toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
  .toolbar input, .toolbar select { padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; background: #fff; color: var(--text); transition: border-color .15s; }
  .toolbar input::placeholder { color: var(--text-secondary); opacity: .5; }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .toolbar input { flex: 1; min-width: 220px; }
  .toolbar select { min-width: 130px; cursor: pointer; }
  .toolbar label { color: var(--text-secondary); }
  .toolbar input[type="checkbox"] { accent-color: var(--primary); width: auto; min-width: auto; flex: none; cursor: pointer; }

  /* ═══ 按钮 ═══ */
  .btn { padding: 6px 14px; border: 1px solid transparent; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .15s; white-space: nowrap; background: transparent; }
  .btn-primary { background: rgba(99,102,241,0.1); color: #4f46e5; border: 1px solid rgba(99,102,241,0.2); }
  .btn-primary:hover { background: rgba(99,102,241,0.16); border-color: rgba(99,102,241,0.35); }
  .btn-success { background: rgba(5,150,105,0.1); color: #047857; border: 1px solid rgba(5,150,105,0.2); }
  .btn-success:hover { background: rgba(5,150,105,0.16); border-color: rgba(5,150,105,0.35); }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
  .btn-outline:hover { border-color: var(--border-strong); color: var(--text); background: #f3f4f6; }
  .btn-sm { padding: 5px 10px; font-size: 11px; font-weight: 500; }
  .btn:disabled, .btn[disabled] { opacity: .45; pointer-events: none; cursor: not-allowed; }

  /* ═══ 卡片/表格 ═══ */
  .card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f9fafb; padding: 11px 16px; text-align: left; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
  td { padding: 11px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr.clickable { cursor: pointer; transition: background .12s; }
  tr.clickable:hover { background: #eef2ff; }
  td.query { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ═══ Badge ═══ */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; letter-spacing: .2px; border: 1px solid transparent; }
  .badge-eval { background: #eef2ff; color: #4f46e5; border-color: #e0e7ff; }
  .badge-production { background: #fffbeb; color: #92400e; border-color: #fef3c7; }
  .badge-success { background: #ecfdf5; color: #065f46; border-color: #d1fae5; }
  .badge-error { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
  .badge-trace { background: #f5f3ff; color: #6d28d9; border-color: #ede9fe; }
  .badge-manual { background: #eef2ff; color: #4f46e5; border-color: #e0e7ff; }
  .badge-llm { background: #fdf2f8; color: #9d174d; border-color: #fce7f3; }
  .badge-running { background: #fffbeb; color: #92400e; border-color: #fef3c7; animation: pulse 1.5s infinite; }
  .badge-completed { background: #ecfdf5; color: #065f46; border-color: #d1fae5; }
  .badge-failed { background: #fef2f2; color: #991b1b; border-color: #fecaca; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }

  /* ═══ 分数 ═══ */
  .score-cell { font-weight: 700; font-size: 15px; }
  .score-high { color: var(--success); }
  .score-mid { color: var(--warning); }
  .score-low { color: var(--danger); }

  /* ═══ 分页 ═══ */
  .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; padding: 16px; }
  .pagination span { font-size: 13px; color: var(--text-secondary); }

  /* ═══ CaseSet 工作台 ═══ */
  .case-set-workbench { display: grid; grid-template-columns: minmax(0, 1.4fr) minmax(320px, .9fr); gap: 14px; align-items: start; }
  .case-set-form { padding: 18px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card-bg); }
  .case-set-form h3 { font-size: 15px; margin-bottom: 14px; color: var(--text); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-field { display: flex; flex-direction: column; gap: 5px; min-width: 0; }
  .form-field.full { grid-column: 1 / -1; }
  .form-field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--text-secondary); }
  .form-field input, .form-field textarea, .form-field select { width: 100%; padding: 9px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; outline: none; resize: vertical; background: #fff; color: var(--text); }
  .form-field input::placeholder, .form-field textarea::placeholder { color: var(--text-secondary); opacity: .5; }
  .form-field input:focus, .form-field textarea:focus, .form-field select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  .form-field textarea { min-height: 160px; line-height: 1.55; font-family: inherit; }
  .task-panel { margin-top: 14px; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: #f9fafb; }
  .task-panel.hidden { display: none; }
  .task-progress { height: 8px; border-radius: 5px; background: #e5e7eb; overflow: hidden; margin: 10px 0; }
  .task-progress-fill { height: 100%; background: var(--primary); border-radius: 5px; transition: width .25s; }
  .task-meta { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 12px; color: var(--text-secondary); }
  .task-meta code { background: #e5e7eb; padding: 1px 6px; border-radius: 3px; font-size: 11px; color: var(--text); }
  .task-results { margin-top: 10px; max-height: 180px; overflow: auto; font-size: 12px; }
  .task-result-row { display: flex; gap: 8px; padding: 6px 0; border-top: 1px solid var(--border); }
  .task-result-row:first-child { border-top: none; }
  .task-result-row .idx { flex: 0 0 28px; color: var(--text-secondary); }
  .task-result-row .msg { min-width: 0; flex: 1; word-break: break-word; }
  @media (max-width: 900px) {
    .case-set-workbench { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .bento-row { grid-template-columns: repeat(2, 1fr); }
  }

  /* ═══ 侧滑抽屉 ═══ */
  .slide-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; backdrop-filter: blur(2px); }
  .slide-overlay.show { display: block; }
  .slide-panel { position: fixed; top: 0; right: 0; width: 580px; max-width: 100vw; height: 100vh; background: var(--card-bg); box-shadow: -8px 0 40px rgba(0,0,0,.4); z-index: 1001; transform: translateX(100%); transition: transform .3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column; }
  .slide-panel.show { transform: translateX(0); }
  .slide-header { padding: 18px 22px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .slide-header h3 { font-size: 17px; margin: 0; }
  .slide-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-secondary); padding: 4px 8px; border-radius: 6px; line-height: 1; transition: all .15s; }
  .slide-close:hover { background: #f3f4f6; color: var(--text); }
  .slide-tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .slide-tab { padding: 10px 18px; border: none; background: none; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
  .slide-tab:hover { color: var(--text); }
  .slide-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .slide-body { flex: 1; overflow: auto; padding: 20px; }
  .slide-body pre { background: #f9fafb; border-radius: var(--radius-sm); padding: 14px; overflow-x: auto; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; max-height: 300px; border: 1px solid var(--border); }
  .slide-body hr { margin: 16px 0; border: none; border-top: 1px solid var(--border); }
  .slide-body code { background: #e5e7eb; padding: 1px 5px; border-radius: 3px; font-size: 12px; }

  /* ═══ Toast ═══ */
  .toast { position: fixed; top: 24px; right: 24px; padding: 12px 22px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; color: #fff; z-index: 2000; transform: translateX(120%); transition: transform .3s cubic-bezier(.4,0,.2,1); backdrop-filter: blur(8px); }
  .toast.show { transform: translateX(0); }
  .toast-success { background: var(--success); }
  .toast-error { background: var(--danger); }

  /* ═══ 空状态 ═══ */
  .empty-state { text-align: center; padding: 56px 24px; color: var(--text-secondary); font-size: 13px; font-weight: 500; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #e5e7eb; border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ═══ 概览统计卡片（抽屉内） ═══ */
  .overview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .stat-card { background: #f9fafb; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; display: flex; flex-direction: column; gap: 5px; }
  .stat-card .stat-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 6px; background: var(--primary); flex-shrink: 0; }
  .stat-card .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-secondary); font-weight: 600; }
  .stat-card .stat-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-card .stat-sub { font-size: 11px; color: var(--text-secondary); }
  .score-gauge { height: 6px; border-radius: 4px; background: #e5e7eb; margin-top: 4px; overflow: hidden; }
  .score-gauge-fill { height: 100%; border-radius: 4px; transition: width .3s; }
  .score-gauge-fill.high { background: var(--success); }
  .score-gauge-fill.mid { background: var(--warning); }
  .score-gauge-fill.low { background: var(--danger); }

  /* ═══ Span 分布条 ═══ */
  .distro-bar { display: flex; height: 22px; border-radius: 6px; overflow: hidden; margin-top: 8px; }
  .distro-seg { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; min-width: 28px; transition: flex .3s; }
  .distro-seg.intent { background: #6366f1; }
  .distro-seg.retrieval { background: #8b5cf6; }
  .distro-seg.tool_call { background: #f59e0b; }
  .distro-seg.generation { background: #10b981; }
  .distro-seg.outcome { background: #ef4444; }

  /* ═══ Span 链路图 ═══ */
  .span-chain-wrapper { padding: 8px 0 20px; overflow: visible; max-width: 100%; }
  .span-chain { display: flex; flex-direction: column; align-items: stretch; gap: 6px; width: min(178px, 100%); box-sizing: border-box; padding: 0 8px; }
  .span-node { position: relative; display: flex; flex-direction: column; align-items: stretch; flex-shrink: 0; cursor: pointer; min-width: 0; }
  .span-node-box { width: 100%; box-sizing: border-box; padding: 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: #fff; transition: all .2s; display: grid; grid-template-columns: 26px minmax(0,1fr); align-items: center; gap: 8px; }
  .span-node-box.has-controls { grid-template-columns: 26px minmax(0,1fr); }
  .span-node-box:hover { border-color: var(--primary); box-shadow: 0 4px 16px rgba(129,140,248,.15); transform: translateX(2px); }
  .span-node-box .node-main { min-width: 0; }
  .span-node-box .node-head { display: flex; align-items: center; gap: 5px; min-width: 0; }
  .span-node-box .node-seq { flex: 0 0 auto; font-size: 10px; font-weight: 600; color: var(--text-secondary); }
  .span-node-box .node-icon { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .node-icon.intent { background: #818cf8; }
  .node-icon.retrieval { background: #34d399; }
  .node-icon.tool_call { background: #fbbf24; }
  .node-icon.generation { background: #60a5fa; }
  .node-icon.outcome { background: #a78bfa; }
  .span-node-box .node-type { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; font-weight: 700; color: var(--text); }
  .span-node-box .node-time { font-size: 10px; color: var(--text-secondary); margin-top: 3px; }
  .span-node-controls { grid-column: 1 / -1; min-width: 0; }
  .span-layer-select { display: block; width: 100%; max-width: 100%; box-sizing: border-box; margin-top: 4px; padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: #fff; color: var(--text); font-size: 11px; }
  .span-edit-hint { margin: 0 0 10px; padding: 8px 12px; border-radius: var(--radius-sm); background: #f0fdf4; color: #166534; font-size: 12px; border: 1px solid #bbf7d0; }
  .span-edit-hint.blocked { background: #f9fafb; color: var(--text-secondary); border-color: var(--border); }
  .span-arrow { display: flex; align-items: center; justify-content: flex-start; flex-shrink: 0; height: 18px; padding-left: 13px; }
  .span-arrow svg { width: 16px; height: 18px; }
  .span-arrow line { stroke: #cbd5e1; stroke-width: 2; }
  .span-arrow polyline { fill: none; stroke: #cbd5e1; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ═══ Span Popover ═══ */
  .span-popover { display: none; position: fixed; z-index: 2000; width: 340px; max-height: 420px; overflow-y: auto; background: #fff; border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 12px 48px rgba(0,0,0,.15); padding: 16px; font-size: 12px; pointer-events: auto; }
  .span-popover .pop-section { margin-bottom: 10px; }
  .span-popover .pop-section:last-child { margin-bottom: 0; }
  .span-popover .pop-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--text-secondary); margin-bottom: 4px; }
  .span-popover .pop-value { font-size: 12px; color: var(--text); word-break: break-all; line-height: 1.5; }
  .span-popover pre { background: #f9fafb; border-radius: 4px; padding: 8px; font-size: 11px; max-height: 100px; overflow-y: auto; margin: 0; white-space: pre-wrap; word-break: break-all; border: 1px solid var(--border); }
  .span-popover .dim-badge { display: inline-block; margin: 1px 4px 1px 0; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 500; border: 1px solid rgba(0,0,0,.06); }
  .span-popover code { background: #e5e7eb; padding: 1px 5px; border-radius: 3px; }

  /* ═══ Final Response ═══ */
  .fr-section { margin-top: 16px; }
  .fr-toolbar { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .fr-toolbar .fr-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--text-secondary); margin-right: auto; }
  .fr-toggle { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--card-bg); font-size: 11px; font-weight: 600; color: var(--text-secondary); cursor: pointer; transition: all .15s; }
  .fr-toggle:hover { border-color: var(--border-strong); color: var(--text); }
  .fr-toggle.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .fr-raw { display: block; }
  .fr-raw.hidden { display: none; }
  .fr-preview { display: none; background: #f9fafb; border-radius: var(--radius-sm); padding: 16px; font-size: 13px; line-height: 1.7; max-height: 400px; overflow-y: auto; border: 1px solid var(--border); }
  .fr-preview.visible { display: block; }
  .fr-preview h1, .fr-preview h2, .fr-preview h3 { margin: 14px 0 8px; line-height: 1.3; color: var(--text); }
  .fr-preview h1 { font-size: 18px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .fr-preview h2 { font-size: 15px; }
  .fr-preview h3 { font-size: 13px; }
  .fr-preview p { margin: 6px 0 10px; }
  .fr-preview ul, .fr-preview ol { padding-left: 22px; margin: 6px 0 10px; }

<script>
const API_BASE = '/api';

// ═══ 工具函数 ═══
function $(sel) { return document.querySelector(sel); }
function $$(sel) { return document.querySelectorAll(sel); }

function showToast(msg, type='success') {
  const t = $('#toast');
  t.textContent = msg;
  t.className = `toast toast-${type} show`;
  setTimeout(() => t.classList.remove('show'), 2500);
}

function formatDate(d) { return new Date(d).toLocaleString('zh-CN'); }
function formatDateSafe(d) { return d ? formatDate(d) : '-'; }
function scoreClass(s) { return s >= 80 ? 'score-high' : s >= 50 ? 'score-mid' : 'score-low'; }
function sourceBadge(s) {
  const map = { eval:'badge-eval', production:'badge-production' };
  return `<span class="badge ${map[s]||'badge-eval'}">${s}</span>`;
}
function caseSourceBadge(s) {
  const map = { manual:'badge-manual', trace:'badge-trace', llm_auto:'badge-llm', llm_reviewed:'badge-llm', hybrid:'badge-llm' };
  return `<span class="badge ${map[s]||'badge-manual'}">${s}</span>`;
}
function statusBadge(s) {
  return s === 'success' ? `<span class="badge badge-success">${s}</span>` : `<span class="badge badge-error">${s}</span>`;
}

// ── 层特定关键指标提取 ──
// 根据不同评测层提取最有价值的上下文信息，帮助用户快速定位改进方向
function layerSpecificDetails(layer, dims) {
  if (!layer || !dims) return '';
  const skipped = dims._skipped || [];
  const parts = [];
  const kv = (label, val, clr) => `<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 7px;background:#eef2ff;border-radius:4px;font-size:11px;white-space:nowrap;"><span style="color:var(--text-secondary);">${label}</span><b style="color:${clr||'var(--text)'};">${val}</b></span>`;
  const info = (html) => `<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 7px;background:#f0fdf4;border-radius:4px;font-size:11px;white-space:nowrap;">${html}</span>`;
  const warn = (html) => `<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 7px;background:#fef3c7;border-radius:4px;font-size:11px;white-space:nowrap;">${html}</span>`;

  if (layer === 'intent') {
    const cc = dims.ConfidenceCalibration;
    if (cc && !cc.skipped && cc.confidence != null) parts.push(kv('置信度', cc.confidence));
  }

  if (layer === 'retrieval') {
    const div = dims.Diversity;
    if (div && !div.skipped && div.note) parts.push(info(`<span style="color:var(--text-secondary);">Diversity</span> <span style="color:var(--warning);">${div.note}</span>`));
  }

  if (layer === 'tool_call' || layer === 'tool') {
    const eff = dims.Efficiency;
    if (eff && !eff.skipped) parts.push(kv('工具调用', `${eff.actual_count ?? '-'} / ${eff.expected_count ?? '-'}`));
    const sr = dims.SuccessRate;
    if (sr && !sr.skipped) parts.push(kv('成功率', `${sr.success}/${sr.total}`, sr.score >= 100 ? 'var(--success)' : 'var(--warning)'));
  }

  if (layer === 'generation') {
    const fa = dims.FactualAccuracy;
    if (fa && !fa.skipped) {
      const llmS = fa.llm_score != null ? fa.llm_score : '-';
      parts.push(kv('LLM评分', `${llmS}/5`, fa.score >= 80 ? 'var(--success)' : fa.score >= 60 ? 'var(--warning)' : 'var(--danger)'));
    }
    const hl = dims.HallucinationScore;
    if (hl && !hl.skipped) {
      const hClr = hl.hallucination_count === 0 ? 'var(--success)' : 'var(--danger)';
      parts.push(kv('幻觉', `${hl.hallucination_count ?? '-'}/${hl.total_sentences ?? '-'}句`, hClr));
      if (hl.overall_severity && hl.overall_severity !== 'none')
        parts.push(warn(`严重度: <b style="color:var(--danger);">${hl.overall_severity}</b>`));
    }
    const ss = dims.SemanticSimilarity;
    if (ss && !ss.skipped) parts.push(kv('语义相似度', `${ss.score.toFixed(0)}%`, ss.score >= 80 ? 'var(--success)' : 'var(--warning)'));
    const cp = dims.Completeness;
    if (cp && cp.details && cp.details.length) {
      const covered = cp.details.filter(d => d.coverage === 'fully_covered').length;
      const partial = cp.details.filter(d => d.coverage === 'partially_covered').length;
      const notCov = cp.details.filter(d => d.coverage === 'not_covered').length;
      let cpHtml = `覆盖: <b style="color:var(--success);">${covered}全</b>`;
      if (partial) cpHtml += ` <b style="color:var(--warning);">${partial}部分</b>`;
      if (notCov) cpHtml += ` <b style="color:var(--danger);">${notCov}缺失</b>`;
      parts.push(info(cpHtml));
    }
    const ann = dims._annotation_source;
    if (ann) {
      if (ann.gold_answer?.method === 'llm_auto_generated')
        parts.push(info(`标注: <b style="color:#9d174d;">LLM生成</b> (置信${((ann.gold_answer.confidence||0)*100).toFixed(0)}%)`));
      else if (ann.gold_answer?.method === 'llm_generation_failed')
        parts.push(warn('标注: <b style="color:var(--danger);">生成失败</b>'));
    }
  }

  if (layer === 'outcome' || (!layer && !skipped.length && dims.LatencyScore)) {
    const lat = dims.LatencyScore;
    if (lat) {
      const lClr = lat.total_latency_ms < 2000 ? 'var(--success)' : lat.total_latency_ms < 5000 ? 'var(--warning)' : 'var(--danger)';
      parts.push(kv('总延迟', lat.total_latency_ms < 1000 ? `${lat.total_latency_ms}ms` : `${(lat.total_latency_ms/1000).toFixed(1)}s`, lClr));
    }
    const tc = dims.TaskCompletion;
    if (tc && !tc.skipped) parts.push(kv('任务完成', `${tc.score.toFixed(0)}`, tc.score >= 80 ? 'var(--success)' : 'var(--warning)'));
    const te = dims.TokenEfficiency;
    if (te && !te.skipped && te.total_tokens) parts.push(kv('Token', te.total_tokens));
    const se = dims.SatisfactionEstimate;
    if (se && !se.skipped && se.penalty > 0) parts.push(warn(`满意度惩罚: <b>${se.penalty}</b>`));
  }

  if (skipped.length > 0) {
    parts.push(`<span style="display:inline-flex;align-items:center;gap:2px;padding:2px 7px;background:#f3f4f6;border-radius:4px;font-size:11px;color:var(--text-secondary);white-space:nowrap;">${skipped.length} 维跳过</span>`);
  }

  return parts.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">${parts.join('')}</div>`
    : '';
}

// ═══ 侧滑抽屉 ═══
let _slideTabs = {};

function openSlidePanel(title, bodyHtml, tabs) {
  $('#slide-title').textContent = title;
  $('#slide-body').innerHTML = bodyHtml;
  _slideTabs = tabs || {};

  const tabsEl = $('#slide-tabs');
  const tabKeys = Object.keys(_slideTabs);
  if (tabKeys.length > 1) {
    tabsEl.style.display = 'flex';
    tabsEl.innerHTML = tabKeys.map((key, i) =>
      `<button class="slide-tab${i === 0 ? ' active' : ''}" data-tab="${key}" onclick="switchSlideTab('${key}')">${_slideTabs[key].label}</button>`
    ).join('');
  } else {
    tabsEl.style.display = 'none';
  }

  $('#slide-overlay').classList.add('show');
  $('#slide-panel').classList.add('show');
}

function switchSlideTab(key) {
  const tab = _slideTabs[key];
  if (!tab) return;
  $('#slide-body').innerHTML = tab.html;
  $$('#slide-tabs .slide-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === key);
  });
}

function closeSlidePanel() {
  $('#slide-overlay').classList.remove('show');
  $('#slide-panel').classList.remove('show');
}

// ═══ Tab 切换 ═══
$$('.nav-pill').forEach(btn => btn.addEventListener('click', function() {
  $$('.nav-pill').forEach(b => b.classList.remove('active'));
  this.classList.add('active');
  const tab = this.dataset.tab;
  $('#panel-traces').style.display = tab === 'traces' ? '' : 'none';
  $('#panel-cases').style.display = tab === 'cases' ? '' : 'none';
  $('#panel-case-sets').style.display = tab === 'case-sets' ? '' : 'none';
  if (tab === 'traces') loadTraces();
  else if (tab === 'cases') loadCases();
  else if (tab === 'case-sets') loadCaseSets();
}));

// ═══ Traces ═══
let tracePage = 0;
async function loadTraces(page = 0) {
  tracePage = page;
  const params = new URLSearchParams();
  const search = $('#trace-search').value;
  if (search) params.set('search', search);
  const source = $('#trace-source').value;
  if (source) params.set('source', source);
  const status = $('#trace-status').value;
  if (status) params.set('status', status);
  if ($('#only-without-case').checked) params.set('only_without_case', 'true');
  params.set('limit', '20');
  params.set('offset', String(page * 20));

  try {
    const res = await fetch(`${API_BASE}/cases/traces/list?${params}`);
    const data = await res.json();
    renderTraces(data);
    $('#stat-traces').textContent = data.total;
    $('#bento-traces').textContent = data.total;
  } catch(e) {
    showToast('加载 Trace 列表失败', 'error');
  }
}

function renderTraces(data) {
  const tbody = $('#trace-tbody');
  if (!data.items.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">暂无 Trace 数据</td></tr>';
    return;
  }
  tbody.innerHTML = data.items.map(t => `
    <tr class="clickable" onclick="viewTraceDetail('${t.id}', ${t.case_id ? `'${t.case_id}'` : 'null'})">
      <td class="query" title="${escapeHtml(t.query)}">${escapeHtml(t.query)}</td>
      <td>${sourceBadge(t.source)}</td>
      <td>${statusBadge(t.status)}</td>
      <td class="score-cell"><span class="${scoreClass(t.overall_score||0)}">${t.overall_score != null ? t.overall_score.toFixed(1) : '-'}</span></td>
      <td>${t.total_latency_ms != null ? (t.total_latency_ms/1000).toFixed(2)+'s' : '-'}</td>
      <td style="font-size:12px;color:var(--text-secondary);">${formatDate(t.created_at)}</td>
      <td>
        ${t.already_case
          ? `<span class="badge badge-trace" style="margin-right:4px;">已转 Case</span><button class="btn btn-outline btn-sm" onclick="event.stopPropagation();viewTraceDetail('${t.id}', '${t.case_id}')">查看</button>`
          : `<button class="btn btn-primary btn-sm" onclick="event.stopPropagation();convertTraceToCase('${t.id}')">转为 Case</button>`}
      </td>
    </tr>
  `).join('');

  const pag = $('#trace-pagination');
  pag.innerHTML = `
    <button class="btn btn-outline btn-sm" onclick="loadTraces(${Math.max(0, tracePage-1)})" ${tracePage===0?'disabled':''}>上一页</button>
    <span>第 ${tracePage+1} 页 / 共 ${Math.ceil(data.total/20)} 页（${data.total} 条）</span>
    <button class="btn btn-outline btn-sm" onclick="loadTraces(${tracePage+1})" ${(tracePage+1)*20>=data.total?'disabled':''}>下一页</button>`;
}

// ── 辅助：格式化 token dict → 可读字符串 ──
function fmtTokens(tk) {
  if (!tk || typeof tk !== 'object') return '-';
  const parts = [];
  if (tk.input_tokens != null) parts.push('in:' + tk.input_tokens);
  else if (tk.prompt_tokens != null) parts.push('in:' + tk.prompt_tokens);
  if (tk.output_tokens != null) parts.push('out:' + tk.output_tokens);
  else if (tk.completion_tokens != null) parts.push('out:' + tk.completion_tokens);
  if (tk.total_tokens != null) parts.push('total:' + tk.total_tokens);
  return parts.length ? parts.join(' ') : JSON.stringify(tk);
}

// ── 辅助：格式化延迟 ──
function fmtLatency(ms) {
  if (ms == null) return '-';
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(2) + 's';
}

// ── 辅助：延迟颜色 ──
function latencyColor(ms) {
  if (ms == null) return 'var(--text-secondary)';
  if (ms < 500) return 'var(--success)';
  if (ms < 2000) return 'var(--warning)';
  return 'var(--danger)';
}

const SPAN_LAYER_OPTIONS = [
  { value: 'intent', label: '意图' },
  { value: 'retrieval', label: '检索' },
  { value: 'tool_call', label: '工具' },
  { value: 'generation', label: '生成' },
];

function spanLayerOptions(current) {
  return SPAN_LAYER_OPTIONS.map(opt =>
    `<option value="${opt.value}" ${opt.value === current ? 'selected' : ''}>${opt.label}</option>`
  ).join('');
}

async function updateCaseSpanLayer(caseId, spanId, spanType, traceId, selectEl) {
  if (!caseId) {
    showToast('该 Trace 未绑定 Case，无法修改 Span 层归属', 'error');
    return;
  }
  selectEl.disabled = true;
  try {
    const res = await fetch(`${API_BASE}/cases/${caseId}/spans/${spanId}/layer`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ span_type: spanType }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '修改失败');
    showToast('Span 层归属已更新', 'success');
    await viewTraceDetail(traceId, caseId);
  } catch(e) {
    showToast(e.message, 'error');
    selectEl.disabled = false;
  }
}

async function viewTraceDetail(traceId, caseId = null) {
  openSlidePanel('Trace 详情', '<div style="text-align:center;padding:40px;"><span class="spinner"></span> 加载中…</div>');
  try {
    const res = await fetch(`${API_BASE}/cases/traces/${traceId}`);
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '加载失败'); }
    const data = await res.json();
    const t = data.trace;
    const spans = data.spans || [];
    const scores = data.eval_scores || [];
    const caseBinding = data.case_binding || {};
    const editCaseId = caseId || caseBinding.case_id || null;
    const canEditSpanLayer = Boolean(editCaseId && caseBinding.span_layer_editable);
    const editBlockReason = caseBinding.span_layer_edit_block_reason || '';

    // ── 概览 HTML：统计卡片布局 ──
    const oscore = t.overall_score;
    const scoreClr = oscore != null ? (oscore >= 80 ? 'high' : oscore >= 60 ? 'mid' : 'low') : '';
    const scorePct = oscore != null ? Math.min(100, Math.max(0, oscore)) : 0;

    const overviewHtml = `
      <div style="margin-bottom:10px;font-size:13px;color:var(--text-secondary);">
        <strong style="color:var(--text);">Query:</strong> ${escapeHtml(t.query || '-')}
      </div>
      <div class="overview-grid">
        <div class="stat-card">
          <div class="stat-dot"></div>
          <div class="stat-label">综合得分</div>
          <div class="stat-value" style="color:${oscore != null ? (oscore >= 80 ? 'var(--success)' : oscore >= 60 ? 'var(--warning)' : 'var(--danger)') : 'var(--text-secondary)'};">${oscore != null ? oscore.toFixed(1) : '-'}</div>
          <div class="score-gauge"><div class="score-gauge-fill ${scoreClr}" style="width:${scorePct}%;"></div></div>
        </div>
        <div class="stat-card">
          <div class="stat-dot"></div>
          <div class="stat-label">总耗时</div>
          <div class="stat-value">${fmtLatency(t.total_latency_ms)}</div>
          <div class="stat-sub">${t.status ? statusBadge(t.status) : ''} &nbsp; ${t.source ? sourceBadge(t.source) : ''}</div>
        </div>
        <div class="stat-card">
          <div class="stat-dot"></div>
          <div class="stat-label">总 Token</div>
          <div class="stat-value" style="font-size:16px;">${fmtTokens(t.total_tokens)}</div>
          <div class="stat-sub">${t.created_at ? formatDate(t.created_at) : '-'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-dot"></div>
          <div class="stat-label">Span 数量</div>
          <div class="stat-value">${t.span_count}</div>
          ${t.span_distribution ? '<div class="distro-bar">' + Object.entries(t.span_distribution).map(([type, count]) =>
            `<div class="distro-seg ${type}" style="flex:${count};">${count}</div>`
          ).join('') + '</div>' : ''}
        </div>
      </div>
      ${t.final_response ? `
      <div class="fr-section">
        <div class="fr-toolbar">
          <span class="fr-label">Final Response</span>
          <button class="fr-toggle active" onclick="switchFRMode(this, 'raw')">Raw</button>
          <button class="fr-toggle" onclick="switchFRMode(this, 'preview')">Preview</button>
        </div>
        <pre class="fr-raw" id="fr-raw">${escapeHtml(t.final_response)}</pre>
        <div class="fr-preview" id="fr-preview"></div>
      </div>` : ''}
    `;

    // ── 构建 span_id → eval_score 映射 ──
    const spanScoreMap = {};
    const orphanScores = [];
    for (const sc of scores) {
      if (sc.span_id) { spanScoreMap[sc.span_id] = sc; }
      else { orphanScores.push(sc); }
    }
    const layerNames = {intent:'意图', retrieval:'检索', tool_call:'工具', generation:'生成', outcome:'结果'};

    // ── Span 链路图 HTML ──
    _popoverStore.clear(); // 每次打开新详情时清空旧缓存

    const buildSpanNode = (sp, idx) => {
      const lname = layerNames[sp.span_type] || sp.span_type;
      const escore = spanScoreMap[sp.id];

      // Popover 详细内容
      let popoverHtml = '';
      popoverHtml += '<div class="pop-section"><div class="pop-title">基本信息</div>';
      popoverHtml += '<div class="pop-value">序列: <b>#' + sp.sequence + '</b> &nbsp;|&nbsp; 类型: <b>' + lname + '</b></div></div>';

      popoverHtml += '<div class="pop-section"><div class="pop-title">性能指标</div>';
      popoverHtml += '<div class="pop-value">耗时: <b style="color:' + latencyColor(sp.latency_ms) + ';">' + fmtLatency(sp.latency_ms) + '</b></div>';
      popoverHtml += '<div class="pop-value">Token: <b>' + fmtTokens(sp.tokens) + '</b></div>';
      if (sp.model) popoverHtml += '<div class="pop-value">Model: <b>' + escapeHtml(sp.model) + '</b></div>';
      popoverHtml += '</div>';

      if (escore) {
        const scClr = escore.score >= 80 ? 'var(--success)' : escore.score >= 60 ? 'var(--warning)' : 'var(--danger)';
        popoverHtml += '<div class="pop-section"><div class="pop-title">评测得分</div>';
        popoverHtml += '<div class="pop-value">综合: <b style="color:' + scClr + ';">' + escore.score.toFixed(1) + '</b> <span class="badge badge-llm" style="font-size:10px;">' + (escore.method || '-') + '</span></div>';
        if (escore.metrics) {
          const dims = escore.metrics;
          const dimKeys = Object.keys(dims).filter(k => !k.startsWith('_'));
          const dimBadges = dimKeys.filter(dk => typeof dims[dk] === 'object' && dims[dk] !== null && 'score' in dims[dk])
            .map(dk => {
              const dv = dims[dk];
              const dClr = dv.score >= 80 ? 'var(--success)' : dv.score >= 60 ? 'var(--warning)' : 'var(--danger)';
              const skipped = dv.skipped ? ' 跳过' : '';
              return '<span class="dim-badge" style="background:' + (dv.score >= 80 ? '#d1fae5' : dv.score >= 60 ? '#fef3c7' : '#fee2e2') + ';color:' + dClr + ';">' + dk + skipped + ': ' + dv.score.toFixed(1) + '</span>';
            }).join('');
          if (dimBadges) popoverHtml += '<div style="margin-top:4px;">' + dimBadges + '</div>';
        }
        popoverHtml += '</div>';
      }

      if (sp.tool_name) {
        popoverHtml += '<div class="pop-section"><div class="pop-title">工具调用</div>';
        popoverHtml += '<div class="pop-value">Tool: <b>' + escapeHtml(sp.tool_name) + '</b></div>';
        if (sp.tool_params) popoverHtml += '<div class="pop-value">Params: <code>' + escapeHtml(JSON.stringify(sp.tool_params)) + '</code></div>';
        popoverHtml += '</div>';
      }

      if (sp.input) {
        popoverHtml += '<div class="pop-section"><div class="pop-title">Input</div>';
        popoverHtml += '<pre>' + escapeHtml(typeof sp.input === 'string' ? sp.input : JSON.stringify(sp.input, null, 2)) + '</pre></div>';
      }
      if (sp.output) {
        popoverHtml += '<div class="pop-section"><div class="pop-title">Output</div>';
        popoverHtml += '<pre>' + escapeHtml(typeof sp.output === 'string' ? sp.output : JSON.stringify(sp.output, null, 2)) + '</pre></div>';
      }

      // 存入全局 Map（by span.id），避免 HTML 属性编码截断
      _popoverStore.set(sp.id, popoverHtml);

      const latencyStr = sp.latency_ms != null ? fmtLatency(sp.latency_ms) : '';
      const layerEditor = canEditSpanLayer
        ? `<div class="span-node-controls"><select class="span-layer-select" onclick="event.stopPropagation();" onchange="event.stopPropagation();updateCaseSpanLayer('${editCaseId}', '${sp.id}', this.value, '${traceId}', this)">${spanLayerOptions(sp.span_type)}</select></div>`
        : '';
      const iconCls = sp.span_type || 'span';
      return '<div class="span-node" data-span-id="' + sp.id + '">'
        + '<div class="span-node-box' + (layerEditor ? ' has-controls' : '') + '">'
        + '<div class="node-icon ' + iconCls + '"></div>'
        + '<div class="node-main">'
        + '<div class="node-head"><span class="node-seq">#' + sp.sequence + '</span><span class="node-type" title="' + escapeHtml(lname) + '">' + lname + '</span></div>'
        + (latencyStr ? '<div class="node-time" style="color:' + latencyColor(sp.latency_ms) + ';">' + latencyStr + '</div>' : '')
        + '</div>'
        + layerEditor
        + '</div>'
        + '</div>';
    };

    const buildArrow = () => '<div class="span-arrow"><svg viewBox="0 0 16 24"><line x1="8" y1="0" x2="8" y2="16"/><polyline points="3,11 8,18 13,11"/></svg></div>';

    const spanEditHint = editCaseId
      ? (canEditSpanLayer
        ? '<div class="span-edit-hint">当前 Case 尚无评分，可修改 Span 层归属。评分后将锁定此操作。</div>'
        : '<div class="span-edit-hint blocked">Span 层归属已锁定：' + escapeHtml(editBlockReason || '当前状态不可编辑') + '</div>')
      : '';
    const spansHtml = spans.length
      ? spanEditHint + '<div class="span-chain-wrapper"><div class="span-chain">'
        + spans.map((sp, i) => buildSpanNode(sp, i) + (i < spans.length - 1 ? buildArrow() : '')).join('')
        + '</div></div>'
      : '<div class="empty-state">暂无 Span 数据</div>';

    // ── 评分 HTML ──
    const scoresHtml = scores.length ? scores.map(sc => {
      const dims = sc.metrics || {};
      const dimKeys = Object.keys(dims).filter(k => !k.startsWith('_'));
      const dimDetail = dimKeys.filter(dk => typeof dims[dk] === 'object' && dims[dk] !== null && 'score' in dims[dk])
        .map(dk => {
          const dv = dims[dk];
          const dClr = dv.score >= 80 ? 'var(--success)' : dv.score >= 60 ? 'var(--warning)' : 'var(--danger)';
          const skipped = dv.skipped ? ' 跳过' : '';
          const method = dv.method ? ` <span style="font-size:9px;color:var(--text-secondary);">[${dv.method}]</span>` : '';
          let h = `<div style="font-size:11px;color:var(--text-secondary);margin:3px 0;padding-left:14px;">↳ <b>${dk}</b>${skipped}${method}: <b style="color:${dClr};">${dv.score.toFixed(1)}</b>`;
          // ── FactualAccuracy: LLM评分 + reasoning ──
          if (dk === 'FactualAccuracy' && dv.llm_score != null) {
            h += ` <span style="font-size:10px;background:#eef2ff;padding:1px 5px;border-radius:3px;">LLM: ${dv.llm_score}/5</span>`;
            const r = dv.judge_trace?.reasoning;
            if (r) h += `<div style="font-size:10px;color:#6b7280;margin:2px 0 0 0;padding:3px 8px;background:#fefce8;border-radius:3px;border-left:2px solid #fbbf24;font-style:italic;line-height:1.4;">"${escapeHtml(r.length > 150 ? r.substring(0,150)+'…' : r)}"</div>`;
          }
          // ── Completeness: 检查点覆盖详情 ──
          if (dk === 'Completeness' && dv.details?.length) {
            h += '<div style="margin:3px 0 0 0;">';
            dv.details.forEach(d => {
              const covClr = d.coverage === 'fully_covered' ? '#059669' : d.coverage === 'partially_covered' ? '#d97706' : '#dc2626';
              const covLbl = d.coverage === 'fully_covered' ? '✓ 完全覆盖' : d.coverage === 'partially_covered' ? '◐ 部分覆盖' : '✗ 未覆盖';
              const mLbl = {must_contain:'必须',prefer_contain:'建议',nice_to_have:'可选'}[d.match_mode] || d.match_mode || '';
              const mClr = {must_contain:'#dc2626',prefer_contain:'#d97706',nice_to_have:'#6b7280'}[d.match_mode] || '#6b7280';
              h += `<div style="font-size:10px;color:#374151;margin:1px 0;padding:3px 8px;background:#f9fafb;border-radius:3px;border-left:2px solid ${covClr};">`;
              h += `<span style="color:${mClr};font-weight:600;font-size:9px;">[${mLbl}]</span> ${escapeHtml((d.point||'').length>80?(d.point||'').substring(0,80)+'…':d.point||'')}`;
              h += ` <span style="color:${covClr};font-size:9px;font-weight:600;">${covLbl}</span>`;
              if (d.evidence) h += `<div style="font-size:9px;color:#9ca3af;margin:1px 0 0 10px;font-style:italic;">"${escapeHtml(d.evidence.length>100?d.evidence.substring(0,100)+'…':d.evidence)}"</div>`;
              h += '</div>';
            });
            if (dv.llm_overall_completeness != null)
              h += `<div style="font-size:9px;color:var(--text-secondary);margin:2px 0 0 8px;">整体完整度: ${typeof dv.llm_overall_completeness==='number'?((dv.llm_overall_completeness*100).toFixed(0)+'%'):dv.llm_overall_completeness}</div>`;
            h += '</div>';
          }
          // ── HallucinationScore: 逐句分析 ──
          if (dk === 'HallucinationScore' && dv.judge_trace?.details?.length) {
            h += '<div style="margin:3px 0 0 0;">';
            dv.judge_trace.details.forEach(d => {
              const isClean = d.label === 'clean';
              const lblClr = isClean ? '#059669' : '#dc2626';
              const lblTxt = isClean ? '✓ 无幻觉' : `✗ ${d.type || 'hallucination'}`;
              h += `<div style="font-size:10px;color:#374151;margin:1px 0;padding:3px 8px;background:#f9fafb;border-radius:3px;border-left:2px solid ${lblClr};">`;
              h += `<span style="color:${lblClr};font-weight:600;font-size:9px;">${lblTxt}</span> "${escapeHtml((d.sentence||'').length>60?(d.sentence||'').substring(0,60)+'…':d.sentence||'')}"`;
              if (d.explanation) h += `<div style="font-size:9px;color:#9ca3af;margin:1px 0 0 10px;font-style:italic;">${escapeHtml(d.explanation.length>120?d.explanation.substring(0,120)+'…':d.explanation)}</div>`;
              h += '</div>';
            });
            if (dv.overall_severity && dv.overall_severity !== 'none')
              h += `<div style="font-size:9px;color:var(--danger);margin:2px 0 0 8px;">严重度: ${dv.overall_severity}</div>`;
            h += '</div>';
          }
          // ── Efficiency: 工具调用详情 ──
          if (dk === 'Efficiency' && dv.actual_count != null) {
            h += ` <span style="font-size:10px;color:var(--text-secondary);">(${dv.actual_count}/${dv.expected_count} 次)</span>`;
          }
          // ── SuccessRate: 成功/总数 ──
          if (dk === 'SuccessRate' && dv.total != null) {
            h += ` <span style="font-size:10px;color:var(--text-secondary);">${dv.success}/${dv.total} 成功</span>`;
          }
          // ── LatencyScore: 延迟值 ──
          if (dk === 'LatencyScore' && dv.total_latency_ms != null) {
            const latStr = dv.total_latency_ms < 1000 ? `${dv.total_latency_ms}ms` : `${(dv.total_latency_ms/1000).toFixed(1)}s`;
            h += ` <span style="font-size:10px;color:var(--text-secondary);">${latStr}</span>`;
          }
          // ── TokenEfficiency: token数 ──
          if (dk === 'TokenEfficiency' && dv.total_tokens != null) {
            h += ` <span style="font-size:10px;color:var(--text-secondary);">${dv.total_tokens} tokens</span>`;
          }
          // ── ConfidenceCalibration: 置信度 ──
          if (dk === 'ConfidenceCalibration' && dv.confidence != null) {
            h += ` <span style="font-size:10px;color:var(--text-secondary);">置信度: ${dv.confidence}</span>`;
          }
          h += '</div>';
          return h;
        }).join('');
      // ── Gold Answer ──
      let goldHtml = '';
      const enriched = dims._enriched_expected;
      if (enriched?.gold_answer) {
        const ann = dims._annotation_source?.gold_answer;
        const srcBadge = ann?.method === 'llm_auto_generated'
          ? '<span class="badge badge-llm" style="margin-left:4px;">LLM 生成</span>'
          : ann?.method === 'llm_generation_failed'
            ? '<span class="badge badge-error" style="margin-left:4px;">生成失败</span>'
            : (enriched.gold_answer ? '<span class="badge badge-manual" style="margin-left:4px;">人工</span>' : '');
        goldHtml = `<div style="margin:6px 0 0 0;padding:6px 10px;background:#fefce8;border-radius:4px;border-left:3px solid #fbbf24;font-size:11px;">`
          + `<span style="font-weight:600;color:#92400e;">参考答案</span>${srcBadge}`
          + `<div style="color:#374151;margin-top:2px;line-height:1.5;">${escapeHtml(enriched.gold_answer)}</div></div>`;
      }
      // ── Active Weights ──
      let weightsHtml = '';
      if (dims._active_weights) {
        const aw = dims._active_weights;
        const wTags = Object.entries(aw).map(([k,v]) => `<span style="font-size:9px;padding:1px 5px;background:#f3f4f6;border-radius:3px;margin:1px 2px 1px 0;display:inline-block;">${k}: <b>${(v*100).toFixed(0)}%</b></span>`).join('');
        weightsHtml = `<div style="margin:4px 0 0 0;display:flex;flex-wrap:wrap;gap:1px;"><span style="font-size:9px;color:var(--text-secondary);margin-right:4px;">权重:</span>${wTags}</div>`;
      }
      const layerSpecific = layerSpecificDetails(sc.layer, dims);
      const layerLabel = sc.layer ? (layerNames[sc.layer] || sc.layer) : (sc.span_id ? '(orphan)' : '结果');
      const linkedSpan = sc.span_id ? spans.find(sp => sp.id === sc.span_id) : null;
      const spanRef = linkedSpan ? ` ← #${linkedSpan.sequence} ${layerNames[linkedSpan.span_type] || linkedSpan.span_type}` : '';
      const scoreGaugePct = Math.min(100, Math.max(0, sc.score));
      return `<div style="margin-bottom:8px;padding:10px;background:#f9fafb;border-radius:6px;border-left:3px solid var(--primary);">
        <div style="font-weight:600;display:flex;justify-content:space-between;align-items:center;">
          <span>${layerLabel} <span style="color:${sc.score >= 80 ? 'var(--success)' : sc.score >= 60 ? 'var(--warning)' : 'var(--danger)'};">${sc.score.toFixed(1)}</span> <span class="badge badge-llm" style="font-size:10px;">${sc.method||'-'}</span>${spanRef}</span>
        </div>
        <div class="score-gauge" style="margin-top:6px;"><div class="score-gauge-fill ${sc.score >= 80 ? 'high' : sc.score >= 60 ? 'mid' : 'low'}" style="width:${scoreGaugePct}%;"></div></div>
        ${goldHtml}
        ${dimDetail}
        ${weightsHtml}
        ${layerSpecific}
      </div>`;
    }).join('') : '<div class="empty-state">暂无评分数据</div>';

    openSlidePanel(`Trace: ${escapeHtml((t.query||'').substring(0, 40))}`, overviewHtml, {
      overview: { label: '概览', html: overviewHtml },
      spans: { label: `Spans (${spans.length})`, html: spansHtml },
      scores: { label: `评分 (${scores.length})`, html: scoresHtml },
    });
  } catch(e) {
    openSlidePanel('错误', `<p style="color:var(--danger);">${escapeHtml(e.message)}</p>`);
  }
}

async function convertTraceToCase(traceId) {
  if (!confirm('确认将该 Trace 转为评测用例？')) return;
  try {
    const res = await fetch(`${API_BASE}/cases/from-trace/${traceId}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{}' });
    if (!res.ok) { const err = await res.json(); throw new Error(err.detail || '转换失败'); }
    showToast('Trace 已成功转为 Case');
    loadTraces(tracePage);
    loadCaseStats();
  } catch(e) {
    showToast(e.message, 'error');
  }
}

// ═══ Cases ═══
let casePage = 0;
async function loadCases(page = 0) {
  casePage = page;
  const params = new URLSearchParams();
  const search = $('#case-search').value;
  if (search) params.set('search', search);
  const source = $('#case-source').value;
  if (source) params.set('source', source);
  const difficulty = $('#case-difficulty').value;
  if (difficulty) params.set('difficulty', difficulty);
  params.set('limit', '20');
  params.set('offset', String(page * 20));

  try {
    const res = await fetch(`${API_BASE}/cases?${params}`);
    const data = await res.json();
    renderCases(data);
    $('#stat-cases').textContent = data.total;
    $('#bento-cases').textContent = data.total;
  } catch(e) {
    showToast('加载 Case 列表失败', 'error');
  }
}

function renderCases(data) {
  const tbody = $('#case-tbody');
  if (!data.items.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-state">暂无用例</td></tr>';
    return;
  }
  tbody.innerHTML = data.items.map(c => {
    const runStatusBadge = runStatusBadgeHtml(c.latest_run_status);
    return `
    <tr data-case-id="${c.id}" data-run-status="${c.latest_run_status || ''}">
      <td class="query" title="${escapeHtml(c.query)}">${escapeHtml(c.query)}</td>
      <td>${caseSourceBadge(c.source)}</td>
      <td>${c.difficulty}</td>
      <td>${c.category || '-'}</td>
      <td data-field="score">${caseScoreHtml(c)}</td>
      <td data-field="run_count">${c.run_count}</td>
      <td data-field="run_status">${runStatusBadge}</td>
      <td><span class="badge ${c.is_active?'badge-success':'badge-error'}">${c.health_status}</span></td>
      <td style="display:flex;gap:6px;" data-field="actions">
        ${caseActionsHtml(c)}
      </td>
    </tr>`;
  }).join('');

  const pag = $('#case-pagination');
  pag.innerHTML = `
    <button class="btn btn-outline btn-sm" onclick="loadCases(${Math.max(0, casePage-1)})" ${casePage===0?'disabled':''}>上一页</button>
    <span>第 ${casePage+1} 页 / 共 ${Math.ceil(data.total/20)} 页（${data.total} 条）</span>
    <button class="btn btn-outline btn-sm" onclick="loadCases(${casePage+1})" ${(casePage+1)*20>=data.total?'disabled':''}>下一页</button>`;

  // 检查是否有 running 状态的 Case，自动启动轮询
  const hasRunning = data.items.some(c => c.latest_run_status === 'running');
  if (hasRunning) {
    startPolling();
  }
}

// ── 评测状态 badge HTML ──
function runStatusBadgeHtml(status) {
  if (status === 'running') return '<span class="badge badge-running"><span class="spinner" style="width:10px;height:10px;border-width:1.5px;vertical-align:middle;margin-right:3px;"></span>评测中</span>';
  if (status === 'completed') return '<span class="badge badge-completed">✓ 完成</span>';
  if (status === 'failed') return '<span class="badge badge-failed">✗ 失败</span>';
  return '<span style="color:var(--text-secondary);">-</span>';
}

function caseScoreHtml(c) {
  const score = c.last_avg_score;
  return `<span class="${scoreClass(score ?? 0)}">${score != null ? score.toFixed(1) : '-'}</span>`;
}

function caseActionsHtml(c) {
  const detailBtn = c.source_trace_id
    ? `<button class="btn btn-outline btn-sm" data-action="detail" onclick="viewTraceDetail('${c.source_trace_id}', '${c.id}')">详情</button>`
    : `<button class="btn btn-outline btn-sm" data-action="detail" onclick="viewCaseDetail('${c.id}')">详情</button>`;
  const evalBtn = c.source_trace_id
    ? (c.latest_run_status === 'running'
        ? '<button class="btn btn-outline btn-sm" data-action="evaluate" disabled><span class="spinner"></span> 评测中</button>'
        : `<button class="btn btn-success btn-sm" data-action="evaluate" onclick="evaluateCase('${c.id}', event)">评分</button>`)
    : '<button class="btn btn-outline btn-sm" data-action="evaluate" disabled title="该 Case 无关联 Trace">无Trace</button>';
  return detailBtn + evalBtn;
}

async function viewCaseDetail(caseId) {
  try {
    const res = await fetch(`${API_BASE}/cases/${caseId}`);
    const c = await res.json();
    const metadata = c.metadata ? JSON.stringify(c.metadata, null, 2) : '{}';
    const traceLink = c.source_trace_id
      ? `<button class="btn btn-outline btn-sm" onclick="closeSlidePanel();setTimeout(()=>viewTraceDetail('${c.source_trace_id}', '${c.id}'),350);">查看原始 Trace</button>`
      : '';
    openSlidePanel(`Case 详情: ${escapeHtml(c.query.substring(0, 50))}`, `
      <p><strong>ID:</strong> <code>${c.id}</code></p>
      <p><strong>来源:</strong> ${c.source} ${traceLink}</p>
      <p><strong>难度:</strong> ${c.difficulty} | <strong>分类:</strong> ${c.category||'-'} | <strong>标签:</strong> ${(c.tags||[]).join(', ')}</p>
      <p><strong>执行次数:</strong> ${c.run_count} | <strong>最近均分:</strong> <span class="${scoreClass(c.last_avg_score||0)}" style="font-weight:700;">${c.last_avg_score != null ? c.last_avg_score.toFixed(1) : '-'}</span></p>
      <hr>
      <p><strong>Gold Answer:</strong></p>
      <pre>${escapeHtml(c.gold_answer || '-')}</pre>
      <p style="margin-top:12px;"><strong>Metadata (Trace 快照):</strong></p>
      <pre>${escapeHtml(metadata)}</pre>
    `);
  } catch(e) { showToast('加载详情失败', 'error'); }
}

async function evaluateCase(caseId, ev = null) {
  const answer = prompt('可选填写期望 Answer / 参考答案；留空则由 LLM 自动生成。');
  if (answer === null) return;

  const btn = ev?.currentTarget || ev?.target?.closest?.('button') || window.event?.target?.closest?.('button');
  if (!btn) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 评测中';

  try {
    const payload = {};
    const trimmedAnswer = answer.trim();
    if (trimmedAnswer) payload.gold_answer = trimmedAnswer;
    const res = await fetch(`${API_BASE}/cases/${caseId}/evaluate`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.error) { showToast(data.error, 'error'); btn.disabled = false; btn.textContent = '评分'; return; }

    // 异步模式：立即显示提示，更新当前行的评测状态
    showToast('评测已提交，正在后台执行...', 'success');

    // 直接更新当前行的 DOM（无感）
    const row = document.querySelector(`tr[data-case-id="${caseId}"]`);
    if (row) {
      row.dataset.runStatus = 'running';
      const statusCell = row.querySelector('td[data-field="run_status"]');
      if (statusCell) statusCell.innerHTML = runStatusBadgeHtml('running');
    }

    // 启动轮询
    startPolling();

  } catch(e) {
    showToast('评分请求失败: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '评分';
  }
}

// ═══ 无感轮询机制 ═══
let _pollTimer = null;
let _isPolling = false;

function startPolling() {
  if (_pollTimer) return; // 已在轮询中
  _pollTimer = setInterval(pollCasesDiff, 5000);
}

function stopPolling() {
  if (_pollTimer) {
    clearInterval(_pollTimer);
    _pollTimer = null;
  }
  _isPolling = false;
}

async function pollCasesDiff() {
  if (_isPolling) return; // 防止重入
  _isPolling = true;

  try {
    // 构建与当前页面相同的查询参数
    const params = new URLSearchParams();
    const search = $('#case-search').value;
    if (search) params.set('search', search);
    const source = $('#case-source').value;
    if (source) params.set('source', source);
    const difficulty = $('#case-difficulty').value;
    if (difficulty) params.set('difficulty', difficulty);
    params.set('limit', '20');
    params.set('offset', String(casePage * 20));

    const res = await fetch(`${API_BASE}/cases?${params}`);
    const data = await res.json();

    let hasRunning = false;

    // 遍历返回的 items，与当前 DOM 逐行比对
    for (const c of data.items) {
      const row = document.querySelector(`tr[data-case-id="${c.id}"]`);
      if (!row) continue;

      const oldStatus = row.dataset.runStatus || '';
      const newStatus = c.latest_run_status || '';

      // 每次轮询都按接口结果重绘可变列，避免按钮/分数与真实状态脱节。
      row.dataset.runStatus = newStatus;

      // 更新"评测"列 badge
      const statusCell = row.querySelector('td[data-field="run_status"]');
      if (statusCell) statusCell.innerHTML = runStatusBadgeHtml(newStatus);

      // 更新"最近均分"列
      const scoreCell = row.querySelector('td[data-field="score"]');
      if (scoreCell) scoreCell.innerHTML = caseScoreHtml(c);

      // 更新"执行次数"列
      const runCountCell = row.querySelector('td[data-field="run_count"]');
      if (runCountCell) runCountCell.textContent = c.run_count;

      // 更新操作列按钮
      const actionsCell = row.querySelector('td[data-field="actions"]');
      if (actionsCell) actionsCell.innerHTML = caseActionsHtml(c);

      if (newStatus === 'running') {
        hasRunning = true;
      } else if (oldStatus === 'running' && newStatus === 'completed') {
        showToast('Case 评测完成', 'success');
      } else if (oldStatus === 'running' && newStatus === 'failed') {
        showToast('Case 评测失败', 'error');
      }
    }

    // 如果当前页没有 running 状态的 Case，停止轮询
    if (!hasRunning) {
      stopPolling();
    }
  } catch(e) {
    console.warn('Polling failed:', e);
  } finally {
    _isPolling = false;
  }
}

async function viewCaseScores(caseId) {
  try {

        // 推断标注来源：从 scores metrics 中找 _annotation_source
        let annSource = {};

          for (const sc of run.scores) {

              break;
            }

        const goldBadge = annSource.gold_answer

            : annSource.gold_answer.method === 'llm_generation_failed'

              : '')
          : (goldAns ? '<span class="badge badge-manual" style="margin-left:6px;">人工</span>' : '');

        const expBadge = annSource.expected_answer
          ? (annSource.expected_answer.method === 'llm_auto_generated'
            ? '<span class="badge badge-llm" style="margin-left:6px;">LLM 生成</span>'
            : annSource.expected_answer.method === 'llm_generation_failed'
              ? '<span class="badge badge-error" style="margin-left:6px;">生成失败</span>'
              : '')
          : (checkPoints.length ? '<span class="badge badge-manual" style="margin-left:6px;">人工</span>' : '');

        let cpHtml = '';
        if (checkPoints.length) {
          cpHtml = '<table style="width:100%;font-size:11px;margin-top:4px;border-collapse:collapse;">'
            + '<tr style="background:#f3f4f6;"><th style="padding:3px 6px;text-align:left;font-size:10px;">检查点</th>'
            + '<th style="padding:3px 6px;text-align:left;font-size:10px;">模式</th>'
            + '<th style="padding:3px 6px;text-align:center;font-size:10px;">权重</th></tr>'
            + checkPoints.map(cp => {
              const matchColors = {must_contain:'#dc2626', prefer_contain:'#d97706', nice_to_have:'#6b7280'};
              const matchLabels = {must_contain:'必须', prefer_contain:'建议', nice_to_have:'可选'};
              const mc = matchColors[cp.match] || '#6b7280';
              return '<tr><td style="padding:3px 6px;border-bottom:1px solid #f3f4f6;">' + escapeHtml(cp.point || '') + '</td>'
                + '<td style="padding:3px 6px;border-bottom:1px solid #f3f4f6;color:' + mc + ';font-weight:600;font-size:10px;">' + (matchLabels[cp.match] || cp.match || '-') + '</td>'
                + '<td style="padding:3px 6px;border-bottom:1px solid #f3f4f6;text-align:center;">' + (cp.weight != null ? cp.weight : '-') + '</td></tr>';
            }).join('')
            + '</table>';
        }

        if (goldAns || checkPoints.length) {
          snapshotHtml = '<div style="margin:8px 0;padding:10px;background:#f0f4ff;border-radius:6px;border:1px solid #c7d2fe;">'
            + '<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:#4338ca;margin-bottom:6px;">Expected Snapshot</div>'
            + (goldAns ? '<div style="margin-bottom:6px;"><span style="font-size:12px;color:var(--text-secondary);">参考答案</span>' + goldBadge
              + '<div style="font-size:12px;margin-top:2px;line-height:1.5;">' + escapeHtml(goldAns) + '</div></div>' : '')
            + (checkPoints.length ? '<div><span style="font-size:12px;color:var(--text-secondary);">检查点</span>' + expBadge + cpHtml + '</div>' : '')
            + '</div>';
        }
      }

      const scoresDetail = run.scores ? run.scores.map(s => {
        const layer = s.layer || 'unknown';
        const layerLabel = layerNames[layer] || layer;
        const scClr = s.score >= 80 ? 'var(--success)' : s.score >= 60 ? 'var(--warning)' : 'var(--danger)';
        const dims = s.metrics || {};
        const dimKeys = Object.keys(dims).filter(k => !k.startsWith('_'));
        const dimDetail = dimKeys.filter(dk => typeof dims[dk] === 'object' && dims[dk] !== null && 'score' in dims[dk])
          .map(dk => {
            const dv = dims[dk]; const dClr = dv.score >= 80 ? 'var(--success)' : dv.score >= 60 ? 'var(--warning)' : 'var(--danger)';
            const skipped = dv.skipped ? ' 跳过' : '';
            const method = dv.method ? ` <span style="font-size:9px;color:var(--text-secondary);">[${dv.method}]</span>` : '';
            let h = `<div style="font-size:11px;color:var(--text-secondary);margin:3px 0;padding-left:14px;">↳ <b>${dk}</b>${skipped}${method}: <b style="color:${dClr};">${dv.score.toFixed(1)}</b>`;
            if (dk === 'FactualAccuracy' && dv.llm_score != null) {
              h += ` <span style="font-size:10px;background:#eef2ff;padding:1px 5px;border-radius:3px;">LLM: ${dv.llm_score}/5</span>`;

                const mLbl = {must_contain:'必须',prefer_contain:'建议',nice_to_have:'可选'}[d.match_mode] || d.match_mode || '';
                const mClr = {must_contain:'#dc2626',prefer_contain:'#d97706',nice_to_have:'#6b7280'}[d.match_mode] || '#6b7280';
                h += `<div style="font-size:10px;color:#374151;margin:1px 0;padding:3px 8px;background:#f9fafb;border-radius:3px;border-left:2px solid ${covClr};">`;
                h += `<span style="color:${mClr};font-weight:600;font-size:9px;">[${mLbl}]</span> ${escapeHtml((d.point||'').length>80?(d.point||'').substring(0,80)+'…':d.point||'')}`;
                h += ` <span style="color:${covClr};font-size:9px;font-weight:600;">${covLbl}</span>`;
                if (d.evidence) h += `<div style="font-size:9px;color:#9ca3af;margin:1px 0 0 10px;font-style:italic;">"${escapeHtml(d.evidence.length>100?d.evidence.substring(0,100)+'…':d.evidence)}"</div>`;
                h += '</div>';
              });
              if (dv.llm_overall_completeness != null)
                h += `<div style="font-size:9px;color:var(--text-secondary);margin:2px 0 0 8px;">整体完整度: ${typeof dv.llm_overall_completeness==='number'?((dv.llm_overall_completeness*100).toFixed(0)+'%'):dv.llm_overall_completeness}</div>`;
              h += '</div>';
            }
            if (dk === 'HallucinationScore' && dv.judge_trace?.details?.length) {
              h += '<div style="margin:3px 0 0 0;">';
              dv.judge_trace.details.forEach(d => {
                const isClean = d.label === 'clean';
                const lblClr = isClean ? '#059669' : '#dc2626';

                if (d.explanation) h += `<div style="font-size:9px;color:#9ca3af;margin:1px 0 0 10px;font-style:italic;">${escapeHtml(d.explanation.length>120?d.explanation.substring(0,120)+'…':d.explanation)}</div>`;
